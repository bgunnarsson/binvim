name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-progress run when a new commit is pushed to the same
# ref — keeps the queue from backing up on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-test

      - name: cargo test
        run: cargo test --locked --all-features

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-clippy

      # `-D warnings` would currently break the build on the pre-existing
      # dead-code warnings the repo carries; lint without escalating so
      # we still surface drift via the run log. Tighten once the existing
      # warnings are paid down.
      - name: cargo clippy
        run: cargo clippy --locked --all-targets -- -A warnings

  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Style policy lives in `rustfmt.toml` at the repo root:
      # `max_width = 100` + `single_line_let_else_max_width = 100`
      # preserve the compact let-else / single-line forms binvim
      # leans on. The 0.4.4 cut ran `cargo fmt` once to normalise
      # the tree; this gate keeps it that way.
      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --check
