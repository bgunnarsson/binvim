name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Tag must already exist on the repo.'
        required: true

permissions:
  contents: write
  # `id-token: write` is required for keyless signing — cosign exchanges
  # the workflow's short-lived OIDC token for a Sigstore Fulcio
  # certificate, signs the artifact, and uploads the proof to the public
  # Rekor transparency log. No long-lived private key in the repo.
  id-token: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
          # macOS targets build natively per arch — GitHub's macos-14
          # runner is aarch64, macos-13 is x86_64. No cross-compile
          # toolchain to wrangle, and the resulting binary is signed
          # by the host's codesign so it doesn't trip Gatekeeper on
          # first launch.
          - target: aarch64-apple-darwin
            runner: macos-14
            use_cross: false
          - target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: build (cross, linux musl)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --locked

      - name: build (native, macos)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          NAME="binvim-${TAG}-${{ matrix.target }}"
          STAGE=$(mktemp -d)
          cp "target/${{ matrix.target }}/release/binvim" "$STAGE/binvim"
          cp README.md LICENSE "$STAGE/"
          tar -C "$STAGE" -czf "${NAME}.tar.gz" binvim README.md LICENSE
          # macOS runners don't ship coreutils' `sha256sum`; fall
          # back to `shasum -a 256`, which is BSD-standard and
          # produces the same `<digest>  <filename>` format.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          else
            shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      # Sigstore keyless signing — no static key in the repo. cosign
      # round-trips the workflow's OIDC token through Fulcio for a
      # short-lived certificate, signs the tarball, and writes a Rekor
      # log entry. Verifiers run:
      #   cosign verify-blob --bundle binvim-vX.Y.Z-target.tar.gz.bundle \
      #     --certificate-identity-regexp \
      #       '^https://github\.com/bgunnarsson/binvim/\.github/workflows/release\.yml@' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     binvim-vX.Y.Z-target.tar.gz
      # The `.bundle` carries the signature, the Fulcio cert, and the
      # Rekor inclusion proof, so verification is offline once it's
      # downloaded.
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign tarball with cosign (keyless)
        shell: bash
        run: |
          set -euo pipefail
          NAME="${{ steps.package.outputs.name }}"
          cosign sign-blob --yes \
            --bundle "${NAME}.tar.gz.bundle" \
            "${NAME}.tar.gz"

      - name: upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.package.outputs.name }}
          path: |
            ${{ steps.package.outputs.name }}.tar.gz
            ${{ steps.package.outputs.name }}.tar.gz.sha256
            ${{ steps.package.outputs.name }}.tar.gz.bundle

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.tar.gz.bundle
