name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Tag must already exist on the repo.'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: build
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --locked
          else
            cargo build --release --target ${{ matrix.target }} --locked
          fi

      - name: package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          NAME="binvim-${TAG}-${{ matrix.target }}"
          STAGE=$(mktemp -d)
          cp "target/${{ matrix.target }}/release/binvim" "$STAGE/binvim"
          cp README.md LICENSE "$STAGE/"
          tar -C "$STAGE" -czf "${NAME}.tar.gz" binvim README.md LICENSE
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          else
            shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}
          path: |
            ${{ steps.package.outputs.name }}.tar.gz
            ${{ steps.package.outputs.name }}.tar.gz.sha256

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: generate Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          ARM_SHA=$(awk '{print $1}' "artifacts/binvim-${TAG}-aarch64-apple-darwin.tar.gz.sha256")
          INTEL_SHA=$(awk '{print $1}' "artifacts/binvim-${TAG}-x86_64-apple-darwin.tar.gz.sha256")

          mkdir -p out
          cat > out/binvim.rb <<RUBY
          class Binvim < Formula
            desc "Vim-grammar TUI editor with batteries included"
            homepage "https://github.com/bgunnarsson/binvim"
            version "${VERSION}"
            license :cannot_represent

            on_macos do
              on_arm do
                url "https://github.com/bgunnarsson/binvim/releases/download/${TAG}/binvim-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM_SHA}"
              end
              on_intel do
                url "https://github.com/bgunnarsson/binvim/releases/download/${TAG}/binvim-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${INTEL_SHA}"
              end
            end

            def install
              bin.install "binvim"
              doc.install "README.md", "LICENSE"
            end

            test do
              assert_predicate bin/"binvim", :executable?
            end
          end
          RUBY

          echo "generated formula:"
          cat out/binvim.rb

      - name: publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            out/binvim.rb

      - name: push formula to homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "TAP_TOKEN secret not set — skipping tap push."
            echo "Copy out/binvim.rb (also attached to the release) into bgunnarsson/homebrew-binvim/Formula/binvim.rb manually."
            exit 0
          fi
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/bgunnarsson/homebrew-binvim.git" tap
          mkdir -p tap/Formula
          cp out/binvim.rb tap/Formula/binvim.rb
          cd tap
          if git diff --quiet; then
            echo "tap formula unchanged — nothing to push."
            exit 0
          fi
          git add Formula/binvim.rb
          git commit -m "binvim ${VERSION}"
          git push
