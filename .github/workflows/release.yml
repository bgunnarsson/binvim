name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Tag must already exist on the repo.'
        required: true

permissions:
  contents: write
  # `id-token: write` is required for keyless signing — cosign exchanges
  # the workflow's short-lived OIDC token for a Sigstore Fulcio
  # certificate, signs the artifact, and uploads the proof to the public
  # Rekor transparency log. No long-lived private key in the repo.
  id-token: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz
            bin_suffix: ''
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz
            bin_suffix: ''
          # x86_64-pc-windows-msvc — native build on a windows-latest
          # runner. Packaged as a .zip (Windows convention) and signed
          # the same way as the Linux tarballs.
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            archive_ext: zip
            bin_suffix: .exe
          # No macOS targets — `brew install bgunnarsson/binvim/binvim`
          # and `cargo install --locked binvim` both work on macOS and
          # avoid the matrix complexity (signing, two arch runners,
          # macos-13 queue starvation). install.sh on Darwin prints
          # both paths instead of trying to download a tarball.
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: build (cross, linux musl)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --locked

      - name: build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        id: package_tar
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          NAME="binvim-${TAG}-${{ matrix.target }}"
          STAGE=$(mktemp -d)
          cp "target/${{ matrix.target }}/release/binvim${{ matrix.bin_suffix }}" "$STAGE/binvim${{ matrix.bin_suffix }}"
          cp "target/${{ matrix.target }}/release/binvim-install${{ matrix.bin_suffix }}" "$STAGE/binvim-install${{ matrix.bin_suffix }}"
          cp README.md LICENSE "$STAGE/"
          tar -C "$STAGE" -czf "${NAME}.tar.gz" \
            "binvim${{ matrix.bin_suffix }}" \
            "binvim-install${{ matrix.bin_suffix }}" \
            README.md LICENSE
          # macOS runners don't ship coreutils' `sha256sum`; fall
          # back to `shasum -a 256`, which is BSD-standard and
          # produces the same `<digest>  <filename>` format.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          else
            shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "archive=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: package (zip)
        if: matrix.archive_ext == 'zip'
        id: package_zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ github.event.inputs.tag }}'
          } else {
            '${{ github.ref_name }}'
          }
          $name = "binvim-$tag-${{ matrix.target }}"
          $stage = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "stage-$name")
          Copy-Item "target/${{ matrix.target }}/release/binvim.exe" (Join-Path $stage 'binvim.exe')
          Copy-Item "target/${{ matrix.target }}/release/binvim-install.exe" (Join-Path $stage 'binvim-install.exe')
          Copy-Item README.md (Join-Path $stage 'README.md')
          Copy-Item LICENSE (Join-Path $stage 'LICENSE')
          Compress-Archive -Path "$stage/*" -DestinationPath "$name.zip" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "$name.zip").Hash.ToLower()
          "$hash  $name.zip" | Set-Content "$name.zip.sha256"
          "name=$name"          | Add-Content $env:GITHUB_OUTPUT
          "archive=$name.zip"   | Add-Content $env:GITHUB_OUTPUT

      # Sigstore keyless signing — no static key in the repo. cosign
      # round-trips the workflow's OIDC token through Fulcio for a
      # short-lived certificate, signs the archive, and writes a Rekor
      # log entry. Verifiers run:
      #   cosign verify-blob --bundle binvim-vX.Y.Z-target.<ext>.bundle \
      #     --certificate-identity-regexp \
      #       '^https://github\.com/bgunnarsson/binvim/\.github/workflows/release\.yml@' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     binvim-vX.Y.Z-target.<ext>
      # The `.bundle` carries the signature, the Fulcio cert, and the
      # Rekor inclusion proof, so verification is offline once it's
      # downloaded.
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign archive with cosign (keyless)
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="${{ steps.package_tar.outputs.archive || steps.package_zip.outputs.archive }}"
          cosign sign-blob --yes \
            --bundle "${ARCHIVE}.bundle" \
            "${ARCHIVE}"

      - name: upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.package_tar.outputs.name || steps.package_zip.outputs.name }}
          path: |
            ${{ steps.package_tar.outputs.archive || steps.package_zip.outputs.archive }}
            ${{ steps.package_tar.outputs.archive || steps.package_zip.outputs.archive }}.sha256
            ${{ steps.package_tar.outputs.archive || steps.package_zip.outputs.archive }}.bundle

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.tar.gz.bundle
            artifacts/*.zip
            artifacts/*.zip.sha256
            artifacts/*.zip.bundle
