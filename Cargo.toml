[package]
name = "binvim"
version = "0.1.0"
edition = "2024"
description = "Vim-grammar TUI editor with batteries included"

[dependencies]
ropey = "1.6"
crossterm = "0.28"
anyhow = "1"
unicode-segmentation = "1.12"
unicode-width = "0.2"
tree-sitter = "0.24"
tree-sitter-rust = "0.23"
tree-sitter-typescript = "0.23"
tree-sitter-json = "0.24"
tree-sitter-go = "0.23"
tree-sitter-md = "0.3"
streaming-iterator = "0.1"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
