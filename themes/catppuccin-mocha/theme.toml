# Catppuccin Mocha — https://github.com/catppuccin/catppuccin
# This mirrors the baked-in default palette, but provided explicitly so
# users can copy it as a starting point.
schema_version = 1

[colors]
# ── Editor surface ─────────────────────────────────────────────────
# `background` paints the buffer body + every chrome surface
# (status line, tabs, popups, terminal pane, debug pane, start
# page, :health, :messages). Omit it for a transparent buffer that
# inherits the terminal's own background; chrome surfaces fall back
# to Catppuccin Mantle so they still have visible contrast.
background        = "#1e1e2e"

# ── Chrome palette ──────────────────────────────────────────────────
# These twelve keys drive every chrome colour: tab bar, status line
# chips, popup borders, terminal / debug headers, dashboard text,
# gutter signs, diagnostics, search / yank flashes, multi-cursor
# blocks, doc-highlight backgrounds. Unset keys fall back to the
# Catppuccin Mocha defaults baked into Config — these explicit
# entries match those defaults so copying this theme as a starting
# point makes every key discoverable.
foreground        = "#cdd6f4"  # main text on chrome
dim               = "#6c7086"  # muted text (line numbers, hints, comments)
emphasis          = "#b4befe"  # active tab fg, multi-cursor block, picker title
surface           = "#45475a"  # layered chrome (active tab bg, picker selection, ~rows)
border            = "#585b70"  # popup borders, dividers, doc-highlight / match-pair bg
accent            = "#fab387"  # debug chip bg, breakpoint, active terminal tab, dirty tab dot
accent_secondary  = "#a6e3a1"  # terminal chip bg, active debug sub-tab, git added stripe
chip_fg           = "#1e1e2e"  # fg on bright colour chips (terminal / debug / search / yank)
error             = "#f38ba8"  # diagnostic + git deleted + breakpoint dot
warning           = "#f9e2af"  # diagnostic + git modified + search highlight bg
info              = "#89b4fa"  # diagnostic + cmdline prompt
hint              = "#89dceb"  # diagnostic + picker mode chip

# ── Syntax captures (tree-sitter / LSP semantic tokens) ────────────
comment           = "#7f849c"
string            = "#a6e3a1"
"string.escape"   = "#f5c2e7"
character         = "#94e2d5"
escape            = "#f5c2e7"
regex             = "#f5c2e7"

keyword           = "#cba6f7"
"keyword.return"  = "#cba6f7"
include           = "#cba6f7"
conditional       = "#cba6f7"
repeat            = "#cba6f7"
exception         = "#cba6f7"
operator          = "#89dceb"

function          = "#89b4fa"
"function.call"   = "#89b4fa"
method            = "#89b4fa"
"method.call"     = "#89b4fa"
macro             = "#fab387"
preproc           = "#fab387"

type              = "#f9e2af"
constructor       = "#f9e2af"
namespace         = "#f9e2af"
module            = "#f9e2af"
attribute         = "#f9e2af"

constant          = "#fab387"
boolean           = "#fab387"
number            = "#fab387"
float             = "#fab387"

tag               = "#f5c2e7"
"tag.attribute"   = "#f9e2af"
label             = "#74c7ec"
property          = "#b4befe"
key               = "#b4befe"
parameter         = "#eba0ac"
variable          = "#cdd6f4"
"variable.builtin" = "#f38ba8"
punctuation       = "#9399b2"

title             = "#f9e2af"
text              = "#cdd6f4"
