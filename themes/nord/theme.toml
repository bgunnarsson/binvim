# Nord — https://www.nordtheme.com
schema_version = 1

[colors]
background        = "#2e3440"

# Chrome neutrals
foreground        = "#d8dee9"
dim               = "#4c566a"
emphasis          = "#b48ead"
surface           = "#3b4252"
border            = "#434c5e"

# Chrome accents
accent            = "#d08770"
accent_secondary  = "#a3be8c"
chip_fg           = "#2e3440"

# Diagnostic / severity
error             = "#bf616a"
warning           = "#ebcb8b"
info              = "#81a1c1"
hint              = "#88c0d0"

# Syntax captures
comment           = "#616e88"
string            = "#a3be8c"
"string.escape"   = "#ebcb8b"
character         = "#a3be8c"
escape            = "#ebcb8b"
regex             = "#ebcb8b"

keyword           = "#81a1c1"
"keyword.return"  = "#81a1c1"
include           = "#81a1c1"
conditional       = "#81a1c1"
repeat            = "#81a1c1"
exception         = "#81a1c1"
operator          = "#81a1c1"

function          = "#88c0d0"
"function.call"   = "#88c0d0"
method            = "#88c0d0"
"method.call"     = "#88c0d0"
macro             = "#88c0d0"
preproc           = "#5e81ac"

type              = "#8fbcbb"
constructor       = "#8fbcbb"
namespace         = "#8fbcbb"
module            = "#8fbcbb"
attribute         = "#8fbcbb"

constant          = "#b48ead"
boolean           = "#b48ead"
number            = "#b48ead"
float             = "#b48ead"

tag               = "#81a1c1"
"tag.attribute"   = "#8fbcbb"
label             = "#88c0d0"
property          = "#d8dee9"
key               = "#8fbcbb"
parameter         = "#d8dee9"
variable          = "#d8dee9"
"variable.builtin" = "#5e81ac"
punctuation       = "#eceff4"

title             = "#88c0d0"
text              = "#d8dee9"
